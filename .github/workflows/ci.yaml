name: CI Pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      CONN_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN || secrets.CAPSTONE_TEST }}
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN || secrets.CAPSTONE_TEST }}
      MLFLOW_TRACKING_USERNAME: kevinsangani988
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN || secrets.CAPSTONE_TEST }}

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run unit tests
        run: |
          python -m pytest -q tests

      - name: validate blob connection string
        shell: bash
        run: |
          if [ -z "$CONN_STRING" ]; then
            echo "CONN_STRING is not set. Add AZURE_STORAGE_CONNECTION_STRING in repository secrets."
            exit 1
          fi

          if [[ "$CONN_STRING" != *"DefaultEndpointsProtocol="* || "$CONN_STRING" != *"AccountName="* || "$CONN_STRING" != *"AccountKey="* || "$CONN_STRING" != *"EndpointSuffix="* ]]; then
            echo "CONN_STRING format looks invalid. Use full Azure Storage connection string."
            exit 1
          fi

      - name: run pipeline
        run: |
          dvc repro 

      - name: Login to AWS ECR
        if: success()
        run: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ secrets.AWS_REGION }}
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker image
        run: |
            docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

      - name: Tag Docker image
        run: |
            docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

    
      - name: Check Docker Authentication
        run: docker info

      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
