stages:
  data_ingestion:
    cmd: python -m src.data.data_ingestion
    deps:
      - src/data/data_ingestion.py
      - src/blob/__init__.py
      - src/logger/__init__.py
      - params.yaml
    params:
      - data_ingestion
    outs:
      - data/raw/train.csv
      - data/raw/test.csv

  data_preprocessing:
    cmd: python -m src.data.data_preprocessing
    deps:
      - src/data/data_preprocessing.py
      - src/logger/__init__.py
      - params.yaml
      - data/raw/train.csv
      - data/raw/test.csv
    params:
      - data_preprocessing
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
      - model/preprocessor.pkl

  model_building:
    cmd: python -m src.model.model_building
    deps:
      - src/model/model_building.py
      - src/logger/__init__.py
      - params.yaml
      - data/processed/train.csv
    params:
      - model_building
    outs:
      - model/model.pkl

  model_evaluation:
    cmd: python -m src.model.model_evaluation
    deps:
      - src/model/model_evaluation.py
      - src/logger/__init__.py
      - params.yaml
      - model/model.pkl
      - data/processed/test.csv
    params:
      - model_evaluation
    metrics:
      - reports/metrics.json
    outs:
      - reports/experiment_info.json

  register_model:
    cmd: python -m src.model.register_model
    deps:
      - src/model/register_model.py
      - src/logger/__init__.py
      - params.yaml
      - reports/experiment_info.json
    params:
      - model_registration
